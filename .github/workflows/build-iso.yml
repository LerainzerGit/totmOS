          rsync -a build/mnt/ build/iso-root/
          sudo umount build/mnt

      - name: Debug - list casper contents
        run: |
          ls -la build/iso-root/
          ls -la build/iso-root/casper/ || echo "no casper dir"
          find build/iso-root -iname "*.squashfs*"

      - name: Extract squashfs filesystem (layered)
        run: |
          sudo rm -rf build/squashfs-root
          sudo unsquashfs -d build/squashfs-root build/iso-root/casper/minimal.squashfs
          sudo unsquashfs -f -d build/squashfs-root build/iso-root/casper/minimal.standard.squashfs
          sudo unsquashfs -f -d build/squashfs-root build/iso-root/casper/minimal.standard.live.squashfs
          
      - name: Apply totmOS customizations (chroot)
        run: |
          sudo cp scripts/customize.sh build/squashfs-root/tmp/customize.sh
          sudo mkdir -p build/squashfs-root/tmp/branding
          sudo cp -r branding/. build/squashfs-root/tmp/branding/ 2>/dev/null || true
          sudo cp wallpaper.png build/squashfs-root/tmp/branding/wallpaper.png
          sudo chmod +x build/squashfs-root/tmp/customize.sh
          sudo mount --bind /dev build/squashfs-root/dev
          sudo mount --bind /proc build/squashfs-root/proc
          sudo mount --bind /sys build/squashfs-root/sys
          sudo cp /etc/resolv.conf build/squashfs-root/etc/resolv.conf
          sudo chroot build/squashfs-root /tmp/customize.sh
          sudo umount build/squashfs-root/dev
          sudo umount build/squashfs-root/proc
          sudo umount build/squashfs-root/sys

      - name: Clean up chroot artifacts
        run: |
          sudo rm -rf build/squashfs-root/tmp/customize.sh build/squashfs-root/tmp/branding
          sudo rm -f build/squashfs-root/var/lib/apt/lists/*_* || true

      - name: Repack squashfs
        run: |
          sudo rm -f build/iso-root/casper/filesystem.squashfs
          sudo mksquashfs build/squashfs-root build/iso-root/casper/filesystem.squashfs \
            -comp xz -b 1M -noappend
          printf $(sudo du -sx --block-size=1 build/squashfs-root | cut -f1) | \
            sudo tee build/iso-root/casper/filesystem.size

      - name: Rebrand ISO metadata
        run: |
          echo "totmOS" | sudo tee build/iso-root/.disk/info

          - name: Debug - list boot images
        run: |
          find build/iso-root -iname "*efi*"
          find build/iso-root -iname "*eltorito*"
          ls -la build/squashfs-root/usr/lib/grub/i386-pc/ | grep -i hybrid

      - name: Rebuild bootable hybrid ISO (replay original boot info)
        run: |
